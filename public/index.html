<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Stream Studio - OBS Clone Pro FIXED</title> <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"> <style> body{ margin:0; font-family:DM Sans; background:#0a0e1a; color:white; } .app{ display:grid; grid-template-columns:340px 1fr 280px; height:100vh; } /* SIDEBAR */ .sidebar{ background:#151b2e; padding:16px; overflow-y:auto; border-right:1px solid #222; } h3{color:#00ff88} input,select,button{ width:100%; padding:10px; margin:5px 0; border:none; border-radius:6px; background:#1e2538; color:white; } button{cursor:pointer;} #connectBtn{background:#00ff88;color:black;font-weight:bold;} #goLiveBtn{background:#9146ff;} #stopStreamBtn{background:#ff3366;} /* STAGE */ .preview{ display:flex; justify-content:center; align-items:center; background:#0a0e1a; } #stage{ position:relative; width:95%; height:90vh; background:black; border-radius:10px; overflow:hidden; } /* LAYERS */ .layer{ position:absolute; border-radius:8px; overflow:hidden; border:2px solid transparent; touch-action:none; } .layer.selected{ border:2px solid #00ff88; } video,iframe,img{ width:100%; height:100%; object-fit:cover; } .handle{ width:10px; height:10px; background:#00ff88; position:absolute; right:0; bottom:0; cursor:nwse-resize; } /* RIGHT PANEL */ .rightPanel{ background:#151b2e; padding:10px; border-left:1px solid #222; } </style> </head> <body> <div class="app"> <!-- LEFT --> <div class="sidebar"> <h3>STREAM.STUDIO FIXED</h3> <button onclick="addScene()">+ Scene</button> <div id="sceneList"></div> <hr> <button onclick="addLayer('screen')">Screen</button> <button onclick="addLayer('webcam')">Webcam</button> <button onclick="addLayer('text')">Text</button> <button onclick="addLayer('image')">Image</button> <hr> <select id="platform"> <option value="">Platform</option> <option value="twitch">Twitch</option> <option value="youtube">YouTube</option> </select> <input id="rtmpUrl" placeholder="RTMP URL"> <input id="streamKey" placeholder="Stream Key"> <button id="connectBtn">Connect</button> <button id="goLiveBtn">Go Live</button> <button id="stopStreamBtn">Stop Stream</button> </div> <!-- STAGE --> <div class="preview"> <div id="stage"></div> </div> <!-- RIGHT --> <div class="rightPanel"> <h4>Status</h4> <div id="status">Not connected</div> </div> </div> <script> let ws = null; let currentScene = 0; let scenes = [[]]; const stage = document.getElementById("stage"); const status = document.getElementById("status"); const rtmpUrl = document.getElementById("rtmpUrl"); const streamKey = document.getElementById("streamKey"); /* ========================= FIXED PLATFORM AUTOFILL ========================= */ document.getElementById("platform").onchange = () => { const v = document.getElementById("platform").value; if(v === "twitch"){ rtmpUrl.value = "rtmp://live.twitch.tv/app/"; } else if(v === "youtube"){ rtmpUrl.value = "rtmp://a.rtmp.youtube.com/live2/"; } }; /* ========================= SCENES ========================= */ function addScene(){ scenes.push([]); renderScenes(); } function renderScenes(){ document.getElementById("sceneList").innerHTML = scenes.map((_,i)=> <button onclick="switchScene(${i})">Scene ${i+1}</button> ).join(""); } function switchScene(i){ currentScene = i; stage.innerHTML = ""; scenes[i].forEach(l => stage.appendChild(l)); } /* ========================= LAYERS ========================= */ function addLayer(type){ const el = document.createElement("div"); el.className = "layer"; if(type === "screen"){ el.innerHTML = "<video autoplay muted></video>"; el.style.width = "100%"; el.style.height = "100%"; startScreen(el); } if(type === "webcam"){ el.innerHTML = "<video autoplay muted></video>"; el.style.width = "220px"; el.style.height = "160px"; startWebcam(el); } if(type === "text"){ el.innerHTML = "<div contenteditable style='padding:10px;color:white'>Text</div>"; el.style.width = "200px"; el.style.height = "80px"; } if(type === "image"){ el.innerHTML = "<img src='https://placekitten.com/300/200'>"; el.style.width = "200px"; el.style.height = "150px"; } makeDraggable(el); makeResizable(el); stage.appendChild(el); scenes[currentScene].push(el); } /* ========================= SOURCES ========================= */ async function startScreen(el){ const stream = await navigator.mediaDevices.getDisplayMedia({video:true,audio:true}); el.querySelector("video").srcObject = stream; } async function startWebcam(el){ const stream = await navigator.mediaDevices.getUserMedia({video:true,audio:true}); el.querySelector("video").srcObject = stream; } /* ========================= DRAG + RESIZE ========================= */ function makeDraggable(el){ let x=0,y=0,down=false; el.onpointerdown = (e)=>{ down=true; x=e.clientX - el.offsetLeft; y=e.clientY - el.offsetTop; el.setPointerCapture(e.pointerId); }; el.onpointermove = (e)=>{ if(!down)return; el.style.left = (e.clientX - x) + "px"; el.style.top = (e.clientY - y) + "px"; }; el.onpointerup = ()=>down=false; } function makeResizable(el){ const h=document.createElement("div"); h.className="handle"; el.appendChild(h); let resizing=false; h.onpointerdown=(e)=>{ resizing=true; e.stopPropagation(); }; window.onpointermove=(e)=>{ if(!resizing)return; el.style.width = (e.clientX - el.offsetLeft) + "px"; el.style.height = (e.clientY - el.offsetTop) + "px"; }; window.onpointerup=()=>resizing=false; } /* ========================= CONNECT FIXED ========================= */ document.getElementById("connectBtn").onclick = () => { const proto = location.protocol === "https:" ? "wss" : "ws"; ws = new WebSocket(${proto}://${location.host}); ws.onopen = () => { ws.send(JSON.stringify({ type:"configure", rtmpUrl: rtmpUrl.value, streamKey: streamKey.value })); status.innerText = "Connected ✔"; }; ws.onclose = () => { status.innerText = "Disconnected"; }; ws.onerror = () => { status.innerText = "WebSocket error"; }; }; /* ========================= STREAM CONTROL (FIXED) ========================= */ document.getElementById("goLiveBtn").onclick = () => { if(!ws || ws.readyState !== 1) return alert("Connect first"); ws.send(JSON.stringify({type:"start-stream"})); status.innerText = "LIVE 🔴"; }; document.getElementById("stopStreamBtn").onclick = () => { if(ws) ws.send(JSON.stringify({type:"stop-stream"})); status.innerText = "Stopped ⏹"; }; </script> </body> </html>

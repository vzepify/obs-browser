<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>stream.studio</title>

<style>
body {
margin: 0;
font-family: sans-serif;
background: #0a0e1a;
color: white;
overflow: hidden;
}

.app {
display: grid;
grid-template-columns: 280px 1fr;
height: 100vh;
}

/* SIDEBAR */
.sidebar {
background: #151b2e;
padding: 10px;
overflow-y: auto;
}

button {
width: 100%;
padding: 10px;
margin: 5px 0;
background: #222;
border: none;
color: white;
cursor: pointer;
border-radius: 6px;
}

button:hover {
background: #333;
}

/* STAGE */
.stage-wrap {
display: flex;
align-items: center;
justify-content: center;
background: black;
position: relative;
}

canvas {
width: 960px;
height: 540px;
background: #000;
border: 2px solid #00ff88;
}

/* LAYER PANEL */
.layer {
background: #1e2538;
padding: 5px;
margin: 5px 0;
cursor: grab;
border-radius: 5px;
}

.layer.active {
border: 2px solid #00ff88;
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">

<h3>OBS CLONE</h3>

<button onclick="addScreen()">Add Screen</button>
<button onclick="addText()">Add Text</button>
<button onclick="addImage()">Add Image</button>

<h4>Layers</h4>
<div id="layers"></div>

</div>

<!-- STAGE -->
<div class="stage-wrap">
<canvas id="c"></canvas>
</div>

</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = 960;
canvas.height = 540;

let layers = [];
let selected = null;

/* SCREEN CAPTURE */
let screenVideo = document.createElement("video");
screenVideo.autoplay = true;
screenVideo.muted = true;

/* ADD SCREEN */
async function addScreen() {
const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
screenVideo.srcObject = stream;

layers.push({
type: "screen",
x: 0,
y: 0,
w: 960,
h: 540
});

renderUI();
}

/* ADD TEXT */
function addText() {
layers.push({
type: "text",
text: "New Text",
x: 100,
y: 100,
size: 30
});

renderUI();
}

/* ADD IMAGE */
function addImage() {
const url = prompt("Image URL");
if (!url) return;

const img = new Image();
img.src = url;

layers.push({
type: "image",
img,
x: 150,
y: 150,
w: 200,
h: 200
});

renderUI();
}

/* DRAW LOOP */
function draw() {
ctx.clearRect(0,0,canvas.width,canvas.height);

layers.forEach(l => {

if (l.type === "screen" && screenVideo.srcObject) {
ctx.drawImage(screenVideo, l.x, l.y, l.w, l.h);
}

if (l.type === "text") {
ctx.fillStyle = "white";
ctx.font = l.size + "px sans-serif";
ctx.fillText(l.text, l.x, l.y);
}

if (l.type === "image") {
ctx.drawImage(l.img, l.x, l.y, l.w, l.h);
}

});

requestAnimationFrame(draw);
}

draw();

/* DRAG SYSTEM */
let drag = null;

canvas.onmousedown = (e) => {
const rect = canvas.getBoundingClientRect();
const mx = e.clientX - rect.left;
const my = e.clientY - rect.top;

layers.forEach(l => {
if (mx > l.x && mx < l.x + (l.w || 100) &&
my > l.y && my < l.y + (l.h || 50)) {
drag = { layer: l, dx: mx - l.x, dy: my - l.y };
selected = l;
renderUI();
}
});
};

canvas.onmousemove = (e) => {
if (!drag) return;

const rect = canvas.getBoundingClientRect();
const mx = e.clientX - rect.left;
const my = e.clientY - rect.top;

drag.layer.x = mx - drag.dx;
drag.layer.y = my - drag.dy;
};

canvas.onmouseup = () => drag = null;

/* UI PANEL */
function renderUI() {
const el = document.getElementById("layers");
el.innerHTML = "";

layers.forEach((l,i) => {
const div = document.createElement("div");
div.className = "layer" + (selected === l ? " active" : "");
div.textContent = l.type + " #" + i;

div.onclick = () => {
selected = l;
renderUI();
};

el.appendChild(div);
});
}
</script>

</body>
</html>

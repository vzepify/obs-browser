<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Studio - RTMP PUSH FIX</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0e1a;
color:white;
}

.app{
display:grid;
grid-template-columns:300px 1fr;
height:100vh;
}

.sidebar{
background:#151b2e;
padding:15px;
}

button,input,select{
width:100%;
padding:10px;
margin:5px 0;
}

#stage{
background:black;
height:90vh;
display:flex;
align-items:center;
justify-content:center;
}

video{
width:80%;
border-radius:10px;
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">

<h3>STREAM STUDIO</h3>

<select id="platform">
<option value="">Platform</option>
<option value="twitch">Twitch</option>
<option value="youtube">YouTube</option>
</select>

<input id="rtmpUrl" placeholder="RTMP URL">
<input id="streamKey" placeholder="Stream Key">

<button id="connectBtn">Connect</button>
<button id="startBtn">START STREAM (PUSH)</button>
<button id="stopBtn">STOP STREAM</button>

<hr>

<button id="screenBtn">Select Screen</button>

</div>

<div id="stage">
<video id="preview" autoplay muted></video>
</div>

</div>

<script>

let ws;
let recorder;
let stream;

/* AUTO PLATFORM URL */
document.getElementById("platform").onchange = () => {
if(platform.value === "twitch"){
rtmpUrl.value = "rtmp://live.twitch.tv/app/";
}
if(platform.value === "youtube"){
rtmpUrl.value = "rtmp://a.rtmp.youtube.com/live2/";
}
};

/* CONNECT WS */
document.getElementById("connectBtn").onclick = () => {

ws = new WebSocket((location.protocol==="https:"?"wss":"ws")+"://"+location.host);

ws.onopen = () => {
ws.send(JSON.stringify({
type:"configure",
rtmpUrl: rtmpUrl.value,
streamKey: streamKey.value
}));

alert("Connected to server");
};
};

/* SCREEN */
document.getElementById("screenBtn").onclick = async () => {
stream = await navigator.mediaDevices.getDisplayMedia({
video:true,
audio:true
});

document.getElementById("preview").srcObject = stream;
};

/* START PUSH STREAM */
document.getElementById("startBtn").onclick = () => {

if(!ws || ws.readyState !== 1){
alert("Connect first");
return;
}

if(!stream){
alert("Select screen first");
return;
}

/* IMPORTANT: THIS is what pushes video */
recorder = new MediaRecorder(stream, {
mimeType:"video/webm;codecs=vp8"
});

recorder.ondataavailable = (e) => {

if(e.data.size > 0 && ws.readyState === 1){

const reader = new FileReader();

reader.onload = () => {
ws.send(JSON.stringify({
type:"video-chunk",
chunk: reader.result.split(",")[1]
}));
};

reader.readAsDataURL(e.data);
}

};

/* send chunks every second */
recorder.start(1000);

/* tell server to start ffmpeg → RTMP */
ws.send(JSON.stringify({
type:"start-stream"
}));

alert("LIVE PUSH STARTED");
};

/* STOP STREAM */
document.getElementById("stopBtn").onclick = () => {

if(recorder) recorder.stop();

if(ws){
ws.send(JSON.stringify({
type:"stop-stream"
}));
}

alert("STREAM STOPPED");
};

</script>

</body>
</html>

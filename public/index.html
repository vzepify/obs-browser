<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Studio - Fixed</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--bg-primary:#0a0e1a;
--bg-secondary:#151b2e;
--bg-tertiary:#1e2538;
--accent:#00ff88;
--text-primary:#fff;
--text-secondary:#8b92ab;
--danger:#ff3366;
--warning:#ffaa00;
}

body{
font-family:'DM Sans',sans-serif;
background:var(--bg-primary);
color:var(--text-primary);
min-height:100vh;
}

.app-container{
display:grid;
grid-template-columns:320px 1fr;
min-height:100vh;
}

.sidebar{
background:var(--bg-secondary);
border-right:1px solid rgba(255,255,255,0.1);
display:flex;
flex-direction:column;
padding:24px;
overflow-y:auto;
}

.logo{
font-family:'Space Mono',monospace;
font-size:22px;
margin-bottom:30px;
color:var(--accent);
}

.section-title{
font-size:12px;
color:var(--text-secondary);
margin-bottom:10px;
}

.scene-btn{
width:100%;
padding:14px;
background:var(--bg-tertiary);
border:none;
border-radius:8px;
margin-bottom:8px;
cursor:pointer;
color:white;
}

.scene-btn.active{
border:2px solid var(--accent);
}

.controls{margin-top:auto;}

.record-btn{
width:100%;
padding:16px;
background:var(--danger);
border:none;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
margin-bottom:10px;
}

.secondary-btn{
width:100%;
padding:12px;
background:var(--bg-tertiary);
border:none;
border-radius:8px;
color:white;
cursor:pointer;
margin-bottom:8px;
}

.preview-area{
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.preview-container{
width:100%;
max-width:1000px;
aspect-ratio:16/9;
background:black;
border-radius:12px;
position:relative;
overflow:hidden;
}

video{
width:100%;
height:100%;
object-fit:contain;
}

.webcam-pip{
position:absolute;
bottom:15px;
right:15px;
width:200px;
border:2px solid var(--accent);
border-radius:10px;
overflow:hidden;
}

.placeholder{
display:flex;
justify-content:center;
align-items:center;
height:100%;
color:var(--text-secondary);
}

.status{
margin-top:10px;
font-family:'Space Mono';
text-align:center;
}
</style>
</head>

<body>

<div class="app-container">

<div class="sidebar">

<div class="logo">STREAM.STUDIO</div>

<div class="section-title">Scene</div>

<button class="scene-btn active" data-scene="screen-webcam">Screen + Webcam</button>
<button class="scene-btn" data-scene="screen-only">Screen Only</button>
<button class="scene-btn" data-scene="webcam-only">Webcam Only</button>

<div class="controls">
<button id="recordBtn" class="record-btn">Start Recording</button>
<button id="pauseBtn" class="secondary-btn" disabled>Pause</button>
<button id="stopBtn" class="secondary-btn" disabled>Stop</button>

<div id="status" class="status">00:00</div>
<div id="downloads"></div>
</div>

</div>

<div class="preview-area">
<div class="preview-container">

<div id="placeholder" class="placeholder">Click record to start</div>

<video id="screenPreview" autoplay muted style="display:none;"></video>

<div id="webcamPip" class="webcam-pip" style="display:none;">
<video id="webcamPreview" autoplay muted></video>
</div>

</div>
</div>

</div>

<script>
let screenStream=null;
let webcamStream=null;
let recorder=null;
let chunks=[];
let scene="screen-webcam";
let startTime=0;
let timer;

const screenPreview=document.getElementById("screenPreview");
const webcamPreview=document.getElementById("webcamPreview");
const webcamPip=document.getElementById("webcamPip");
const placeholder=document.getElementById("placeholder");

const recordBtn=document.getElementById("recordBtn");
const pauseBtn=document.getElementById("pauseBtn");
const stopBtn=document.getElementById("stopBtn");
const status=document.getElementById("status");
const downloads=document.getElementById("downloads");

/* Scene select */
document.querySelectorAll(".scene-btn").forEach(btn=>{
btn.onclick=()=>{ 
document.querySelectorAll(".scene-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
scene=btn.dataset.scene;
};
});

/* Streams */
async function getScreen(){
return await navigator.mediaDevices.getDisplayMedia({video:true,audio:true});
}

async function getWebcam(){
return await navigator.mediaDevices.getUserMedia({video:true,audio:true});
}

/* Start */
recordBtn.onclick=async()=>{
chunks=[];

if(scene.includes("screen")){
screenStream=await getScreen();
screenPreview.srcObject=screenStream;
screenPreview.style.display="block";
placeholder.style.display="none";
}

if(scene.includes("webcam")){
webcamStream=await getWebcam();
webcamPreview.srcObject=webcamStream;
webcamPip.style.display="block";

if(scene==="webcam-only"){
screenPreview.srcObject=webcamStream;
}
}

let stream = screenStream || webcamStream;

let options={mimeType:"video/webm"};
if(MediaRecorder.isTypeSupported("video/webm;codecs=vp9")){
options.mimeType="video/webm;codecs=vp9";
}

recorder=new MediaRecorder(stream,options);

recorder.ondataavailable=e=>{
if(e.data.size>0)chunks.push(e.data);
};

recorder.onstop=()=>{
let blob=new Blob(chunks);
let url=URL.createObjectURL(blob);
downloads.innerHTML += `<a href="${url}" download="recording.webm">Download</a><br>`;
};

recorder.start();

recordBtn.disabled=true;
pauseBtn.disabled=false;
stopBtn.disabled=false;

startTime=Date.now();
timer=setInterval(updateTimer,1000);
};

/* Stop */
stopBtn.onclick=()=>{
recorder.stop();
clearInterval(timer);

recordBtn.disabled=false;
pauseBtn.disabled=true;
stopBtn.disabled=true;
};

/* Pause */
pauseBtn.onclick=()=>{
if(recorder.state==="recording"){
recorder.pause();
pauseBtn.textContent="Resume";
clearInterval(timer);
}else{
recorder.resume();
pauseBtn.textContent="Pause";
startTime=Date.now();
timer=setInterval(updateTimer,1000);
}
};

function updateTimer(){
let t=Math.floor((Date.now()-startTime)/1000);
let m=String(Math.floor(t/60)).padStart(2,"0");
let s=String(t%60).padStart(2,"0");
status.textContent=`${m}:${s}`;
}
</script>

</body>
</html>

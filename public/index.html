<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Studio - Live Enabled</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--bg-primary:#0a0e1a;
--bg-secondary:#151b2e;
--bg-tertiary:#1e2538;
--accent:#00ff88;
--text-primary:#fff;
--text-secondary:#8b92ab;
--danger:#ff3366;
}

body{
font-family:'DM Sans',sans-serif;
background:var(--bg-primary);
color:var(--text-primary);
}

.app-container{
display:grid;
grid-template-columns:320px 1fr;
min-height:100vh;
}

.sidebar{
background:var(--bg-secondary);
padding:20px;
overflow-y:auto;
}

.logo{
color:var(--accent);
margin-bottom:20px;
font-weight:bold;
}

.scene-btn{
width:100%;
padding:10px;
margin-bottom:6px;
background:#222;
color:white;
border:none;
cursor:pointer;
}

.controls{margin-top:20px;}

.record-btn{
width:100%;
padding:12px;
background:var(--danger);
border:none;
color:white;
margin-bottom:8px;
cursor:pointer;
}

.secondary-btn{
width:100%;
padding:10px;
background:#333;
border:none;
color:white;
margin-bottom:6px;
cursor:pointer;
}

input,select{
width:100%;
padding:8px;
margin-bottom:6px;
background:#222;
color:white;
border:none;
}

.preview-area{
display:flex;
justify-content:center;
align-items:center;
}

video{width:100%;}

.webcam-pip{
position:absolute;
bottom:10px;
right:10px;
width:200px;
border:2px solid var(--accent);
}

</style>
</head>

<body>

<div class="app-container">

<div class="sidebar">

<div class="logo">STREAM.STUDIO</div>

<!-- STREAM SETUP -->
<select id="platform">
<option value="">Select Platform</option>
<option value="twitch">Twitch</option>
<option value="youtube">YouTube</option>
<option value="custom">Custom</option>
</select>

<input id="rtmpUrl" placeholder="RTMP URL" style="display:none;">
<input id="streamKey" placeholder="Stream Key" style="display:none;">

<button id="connectBtn">Connect</button>
<button id="goLiveBtn">Go Live</button>
<button id="stopStreamBtn" style="width:100%;padding:10px;margin-top:8px;background:#ff3366;color:white;">
  Stop Streaming
</button>

<hr style="margin:10px 0;">

<!-- RECORD CONTROLS -->
<div class="controls">
<button id="recordBtn" class="record-btn">Record</button>
<button id="stopBtn" class="secondary-btn">Stop</button>
<div id="downloads"></div>
</div>

</div>

<div class="preview-area">
<div style="position:relative;width:80%;">
<video id="preview" autoplay muted></video>
<video id="webcam" class="webcam-pip" autoplay muted style="display:none;"></video>
</div>
</div>

</div>

<script>
let ws;
let connected=false;
let recorder;
let chunks=[];
let stream;

/* UI */
const platform=document.getElementById("platform");
const rtmp=document.getElementById("rtmpUrl");
const key=document.getElementById("streamKey");

/* PLATFORM SELECT */
platform.onchange=()=>{
key.style.display="block";

if(platform.value==="custom"){
rtmp.style.display="block";
}else{
rtmp.style.display="none";

if(platform.value==="twitch"){
rtmp.value="rtmp://live.twitch.tv/app/";
}
if(platform.value==="youtube"){
rtmp.value="rtmp://a.rtmp.youtube.com/live2/";
}
}
};

/* CONNECT */
document.getElementById("connectBtn").onclick=()=>{
const wsProtocol = location.protocol === "https:" ? "wss" : "ws";
const wsUrl = `${wsProtocol}://${location.host}`;
ws = new WebSocket(wsUrl);

ws.onopen=()=>{
ws.send(JSON.stringify({
type:"configure",
rtmpUrl:rtmp.value,
streamKey:key.value
}));

connected=true;
alert("Connected to server");
};

ws.onerror=()=>alert("WebSocket failed");
};

/* START STREAM / RECORD */
async function start(streaming=false){

stream=await navigator.mediaDevices.getDisplayMedia({video:true,audio:true});

document.getElementById("preview").srcObject=stream;

recorder=new MediaRecorder(stream);

recorder.ondataavailable=e=>{
if(e.data.size>0){
chunks.push(e.data);

/* SEND TO SERVER */
if(streaming && connected){
const reader=new FileReader();
reader.onload=()=>{
ws.send(JSON.stringify({
type:"video-chunk",
chunk:reader.result.split(",")[1]
}));
};
reader.readAsDataURL(e.data);
}
}
};

recorder.onstop=()=>{
const blob=new Blob(chunks);
const url=URL.createObjectURL(blob);
document.getElementById("downloads").innerHTML +=
`<a href="${url}" download>Download</a><br>`;
};

recorder.start(1000);

/* START RTMP */
if(streaming && connected){
ws.send(JSON.stringify({type:"start-stream"}));
}
}

/* BUTTONS */
document.getElementById("recordBtn").onclick=()=>start(false);

document.getElementById("goLiveBtn").onclick=()=>{
if(!connected){alert("Connect first");return;}
start(true);
};

document.getElementById("stopBtn").onclick=()=>{
recorder.stop();
if(ws) ws.send(JSON.stringify({type:"stop-stream"}));
};
</script>

</body>
</html>

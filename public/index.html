<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Studio - OBS Audio Mixer</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:DM Sans;background:#0a0e1a;color:white;}
.app{display:grid;grid-template-columns:320px 1fr;height:100vh;}

.sidebar{background:#151b2e;padding:15px;overflow-y:auto;}

button,input,select{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:6px;
background:#1e2538;
color:white;
}

button{cursor:pointer;}

#connectBtn{background:#00ff88;color:black;font-weight:bold;}
#goLiveBtn{background:#9146ff;}
#stopStreamBtn{background:#ff3366;}

.preview{display:flex;justify-content:center;align-items:center;}
video{width:80%;background:black;border-radius:10px;}

.webcam{
position:absolute;
bottom:20px;
right:20px;
width:200px;
border:2px solid #00ff88;
border-radius:10px;
}

/* 🎛 AUDIO MIXER UI */
.mixer-title{
margin-top:10px;
font-size:14px;
opacity:0.8;
}

input[type="range"]{
padding:0;
height:4px;
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">

<h3>STREAM.STUDIO</h3>

<select id="platform">
<option value="">Select Platform</option>
<option value="twitch">Twitch</option>
<option value="youtube">YouTube</option>
<option value="custom">Custom</option>
</select>

<input id="rtmpUrl" placeholder="RTMP URL">
<input id="streamKey" placeholder="Stream Key">

<button id="connectBtn">Connect</button>
<button id="goLiveBtn">Go Live</button>
<button id="stopStreamBtn">Stop Stream</button>

<hr>

<button id="recordBtn">Record</button>
<button id="stopBtn">Stop Recording</button>

<hr>

<!-- 🎛 AUDIO MIXER -->
<div class="mixer-title">🎤 Audio Mixer</div>

<label>Mic</label>
<input id="micVol" type="range" min="0" max="2" step="0.01" value="1">

<label>System</label>
<input id="sysVol" type="range" min="0" max="2" step="0.01" value="1">

<label>Master</label>
<input id="masterVol" type="range" min="0" max="2" step="0.01" value="1">

<div id="downloads"></div>

</div>

<div class="preview">
<div style="position:relative;width:100%;">
<video id="screen" autoplay muted></video>
<video id="webcam" class="webcam" autoplay muted style="display:none;"></video>
</div>
</div>

</div>

<script>
let ws = null;
let connected = false;
let recorder = null;
let chunks = [];
let stream = null;

/* =========================
   AUDIO MIXER (OBS STYLE)
========================= */
let audioCtx = new AudioContext();

let micGain = audioCtx.createGain();
let sysGain = audioCtx.createGain();
let masterGain = audioCtx.createGain();

async function setupAudio(stream) {
  const micStream = await navigator.mediaDevices.getUserMedia({ audio: true });

  const micSource = audioCtx.createMediaStreamSource(micStream);
  const sysSource = audioCtx.createMediaStreamSource(stream);

  micSource.connect(micGain);
  sysSource.connect(sysGain);

  micGain.connect(masterGain);
  sysGain.connect(masterGain);

  masterGain.connect(audioCtx.destination);
}

/* SLIDERS */
document.getElementById("micVol").oninput = e => {
  micGain.gain.value = e.target.value;
};

document.getElementById("sysVol").oninput = e => {
  sysGain.gain.value = e.target.value;
};

document.getElementById("masterVol").oninput = e => {
  masterGain.gain.value = e.target.value;
};

/* UI */
const platform = document.getElementById("platform");
const rtmp = document.getElementById("rtmpUrl");
const key = document.getElementById("streamKey");

/* PLATFORM */
platform.onchange = () => {
if (platform.value === "twitch") {
rtmp.value = "rtmp://live.twitch.tv/app/";
}
if (platform.value === "youtube") {
rtmp.value = "rtmp://a.rtmp.youtube.com/live2/";
}
};

/* CONNECT */
document.getElementById("connectBtn").onclick = () => {

const wsProtocol = location.protocol === "https:" ? "wss" : "ws";
const wsUrl = `${wsProtocol}://${location.host}`;

ws = new WebSocket(wsUrl);

ws.onopen = () => {
ws.send(JSON.stringify({
type: "configure",
rtmpUrl: rtmp.value,
streamKey: key.value
}));

connected = true;
document.getElementById("connectBtn").textContent = "Connected";
};

ws.onclose = () => connected = false;
ws.onerror = () => alert("WebSocket failed");
};

/* SCREEN */
async function getScreen() {
return await navigator.mediaDevices.getDisplayMedia({
video: true,
audio: true
});
}

/* START STREAM */
async function start(streaming = false) {

stream = await getScreen();

document.getElementById("screen").srcObject = stream;

/* 🎛 setup audio mixer */
await setupAudio(stream);

chunks = [];

recorder = new MediaRecorder(stream, {
mimeType: "video/webm;codecs=vp9"
});

recorder.ondataavailable = (e) => {
if (e.data.size > 0) {
chunks.push(e.data);

if (streaming && ws && ws.readyState === WebSocket.OPEN) {
const reader = new FileReader();
reader.onload = () => {
ws.send(JSON.stringify({
type: "video-chunk",
chunk: reader.result.split(",")[1]
}));
};
reader.readAsDataURL(e.data);
}
}
};

recorder.onstop = () => {
const blob = new Blob(chunks);
const url = URL.createObjectURL(blob);

document.getElementById("downloads").innerHTML +=
`<a href="${url}" download>Download</a><br>`;
};

recorder.start(1000);

if (streaming && ws && ws.readyState === WebSocket.OPEN) {
ws.send(JSON.stringify({ type: "start-stream" }));
}
}

/* GO LIVE */
document.getElementById("goLiveBtn").onclick = () => {
if (!ws || ws.readyState !== WebSocket.OPEN) {
alert("Connect first");
return;
}
start(true);
};

/* STOP STREAM */
document.getElementById("stopStreamBtn").onclick = () => {
if (!ws || ws.readyState !== WebSocket.OPEN) {
alert("Not connected");
return;
}

ws.send(JSON.stringify({ type: "stop-stream" }));

if (recorder && recorder.state !== "inactive") {
recorder.stop();
}

connected = false;
document.getElementById("connectBtn").textContent = "Connect";
};

/* RECORD */
document.getElementById("recordBtn").onclick = () => start(false);

document.getElementById("stopBtn").onclick = () => {
if (recorder) recorder.stop();
if (ws) ws.send(JSON.stringify({ type: "stop-stream" }));
};

</script>

</body>
</html>

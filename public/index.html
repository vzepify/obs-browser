<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Studio - Drag OBS Clone</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:DM Sans;
background:#0a0e1a;
color:white;
}

.app{
display:grid;
grid-template-columns:340px 1fr;
height:100vh;
}

/* SIDEBAR */
.sidebar{
background:#151b2e;
padding:16px;
overflow-y:auto;
border-right:1px solid #222;
}

h3{color:#00ff88}

/* controls */
input,select,button{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:6px;
background:#1e2538;
color:white;
}

button{cursor:pointer;}
#connectBtn{background:#00ff88;color:black;font-weight:bold;}
#goLiveBtn{background:#9146ff;}
#stopStreamBtn{background:#ff3366;}

/* preview canvas */
.preview{
position:relative;
display:flex;
justify-content:center;
align-items:center;
background:#0a0e1a;
}

/* STAGE */
#stage{
position:relative;
width:90%;
height:80vh;
background:black;
border-radius:10px;
overflow:hidden;
}

/* DRAGGABLE SOURCES */
.layer{
position:absolute;
cursor:grab;
border-radius:8px;
overflow:hidden;
}

.layer:active{
cursor:grabbing;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

/* webcam default size */
#webcamLayer{
width:200px;
height:150px;
bottom:20px;
right:20px;
border:2px solid #00ff88;
}

#screenLayer{
width:100%;
height:100%;
}

/* audio */
.mixer-title{
margin-top:10px;
opacity:0.7;
font-size:13px;
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">

<h3>STREAM.STUDIO</h3>

<button id="selectScreen">Select Screen</button>
<div id="screenStatus">No screen</div>

<button id="selectWebcam">Enable Webcam</button>
<div id="camStatus">No webcam</div>

<hr>

<select id="platform">
<option value="">Platform</option>
<option value="twitch">Twitch</option>
<option value="youtube">YouTube</option>
</select>

<input id="rtmpUrl" placeholder="RTMP URL">
<input id="streamKey" placeholder="Stream Key">

<button id="connectBtn">Connect</button>
<button id="goLiveBtn">Go Live</button>
<button id="stopStreamBtn">Stop Stream</button>

<hr>

<button id="recordBtn">Record</button>
<button id="stopBtn">Stop</button>

<div id="downloads"></div>

</div>

<!-- PREVIEW -->
<div class="preview">

<div id="stage">

<!-- SCREEN LAYER -->
<div id="screenLayer" class="layer">
<video id="screenVideo" autoplay muted></video>
</div>

<!-- WEBCAM LAYER -->
<div id="webcamLayer" class="layer">
<video id="webcamVideo" autoplay muted></video>
</div>

</div>

</div>

</div>

<script>
let ws;
let screenStream=null;
let webcamStream=null;
let recorder;
let chunks=[];

/* SOURCES */
document.getElementById("selectScreen").onclick = async () => {
screenStream = await navigator.mediaDevices.getDisplayMedia({video:true,audio:true});
document.getElementById("screenVideo").srcObject = screenStream;
document.getElementById("screenStatus").innerText="Screen ready ✔";
};

document.getElementById("selectWebcam").onclick = async () => {
webcamStream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
document.getElementById("webcamVideo").srcObject = webcamStream;
document.getElementById("camStatus").innerText="Webcam ready ✔";
};

/* DRAG SYSTEM */
function makeDraggable(el){
let offsetX=0,offsetY=0,drag=false;

el.onmousedown=(e)=>{
drag=true;
offsetX=e.clientX-el.offsetLeft;
offsetY=e.clientY-el.offsetTop;
el.style.zIndex=999;
};

document.onmousemove=(e)=>{
if(!drag)return;
el.style.left=(e.clientX-offsetX)+"px";
el.style.top=(e.clientY-offsetY)+"px";
};

document.onmouseup=()=>drag=false;
}

makeDraggable(document.getElementById("screenLayer"));
makeDraggable(document.getElementById("webcamLayer"));

/* CONNECT */
document.getElementById("connectBtn").onclick=()=>{
const proto=location.protocol==="https:"?"wss":"ws";
ws=new WebSocket(`${proto}://${location.host}`);

ws.onopen=()=>{
ws.send(JSON.stringify({
type:"configure",
rtmpUrl:rtmpUrl.value,
streamKey:streamKey.value
}));

document.getElementById("connectBtn").innerText="Connected";
};
};

/* START STREAM */
async function start(streaming=false){

if(!screenStream)return alert("Select screen first");

chunks=[];

recorder=new MediaRecorder(screenStream);

recorder.ondataavailable=(e)=>{
if(e.data.size>0){

chunks.push(e.data);

if(streaming && ws){
const reader=new FileReader();
reader.onload=()=>{
ws.send(JSON.stringify({
type:"video-chunk",
chunk:reader.result.split(",")[1]
}));
};
reader.readAsDataURL(e.data);
}
}
};

recorder.onstop=()=>{
const blob=new Blob(chunks);
const url=URL.createObjectURL(blob);
document.getElementById("downloads").innerHTML+=
`<a href="${url}" download>Download</a><br>`;
};

recorder.start(1000);

if(streaming && ws){
ws.send(JSON.stringify({type:"start-stream"}));
}
}

/* BUTTONS */
document.getElementById("goLiveBtn").onclick=()=>{
if(!ws)return alert("Connect first");
start(true);
};

document.getElementById("recordBtn").onclick=()=>start(false);

document.getElementById("stopBtn").onclick=()=>{
if(recorder)recorder.stop();
if(ws)ws.send(JSON.stringify({type:"stop-stream"}));
};

document.getElementById("stopStreamBtn").onclick=()=>{
if(ws)ws.send(JSON.stringify({type:"stop-stream"}));
if(recorder)recorder.stop();
};

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Studio - Fixed OBS</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:DM Sans;
background:#0a0e1a;
color:white;
}

.app{
display:grid;
grid-template-columns:340px 1fr;
height:100vh;
}

/* SIDEBAR */
.sidebar{
background:#151b2e;
padding:16px;
overflow-y:auto;
border-right:1px solid #222;
}

h3{color:#00ff88}

/* inputs */
input,select,button{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:6px;
background:#1e2538;
color:white;
}

button{cursor:pointer;}

#connectBtn{background:#00ff88;color:black;font-weight:bold;}
#goLiveBtn{background:#9146ff;}
#stopStreamBtn{background:#ff3366;}

/* MIXER */
.mixer-title{
margin-top:10px;
opacity:0.7;
font-size:13px;
}

input[type="range"]{
width:100%;
}

/* STAGE */
.preview{
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

#stage{
position:relative;
width:90%;
height:85vh;
background:black;
border-radius:10px;
overflow:hidden;
}

/* DRAGGABLE LAYERS */
.layer{
position:absolute;
touch-action:none;
user-select:none;
border-radius:8px;
overflow:hidden;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

/* webcam */
#webcamLayer{
width:220px;
height:160px;
bottom:20px;
right:20px;
border:2px solid #00ff88;
}

/* screen */
#screenLayer{
width:100%;
height:100%;
top:0;
left:0;
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">

<h3>STREAM.STUDIO</h3>

<button id="selectScreen">Select Screen</button>
<div id="screenStatus">No screen</div>

<button id="selectWebcam">Enable Webcam</button>
<div id="camStatus">No webcam</div>

<hr>

<select id="platform">
<option value="">Platform</option>
<option value="twitch">Twitch</option>
<option value="youtube">YouTube</option>
<option value="custom">Custom</option>
</select>

<input id="rtmpUrl" placeholder="RTMP URL">
<input id="streamKey" placeholder="Stream Key">

<button id="connectBtn">Connect</button>
<button id="goLiveBtn">Go Live</button>
<button id="stopStreamBtn">Stop Stream</button>

<hr>

<div class="mixer-title">🎛 Audio Mixer</div>

<label>Mic</label>
<input id="micVol" type="range" min="0" max="2" step="0.01" value="1">

<label>System</label>
<input id="sysVol" type="range" min="0" max="2" step="0.01" value="1">

<label>Master</label>
<input id="masterVol" type="range" min="0" max="2" step="0.01" value="1">

<hr>

<button id="recordBtn">Record</button>
<button id="stopBtn">Stop Recording</button>

<div id="downloads"></div>

</div>

<!-- PREVIEW -->
<div class="preview">
<div id="stage">

<div id="screenLayer" class="layer">
<video id="screen" autoplay muted></video>
</div>

<div id="webcamLayer" class="layer">
<video id="webcam" autoplay muted></video>
</div>

</div>
</div>

</div>

<script>
let ws;
let recorder;
let chunks=[];
let screenStream=null;
let webcamStream=null;

/* ELEMENTS */
const platform = document.getElementById("platform");
const rtmpUrl = document.getElementById("rtmpUrl");
const streamKey = document.getElementById("streamKey");

/* FIXED PLATFORM AUTOFILL */
platform.onchange = () => {
if(platform.value === "twitch"){
rtmpUrl.value = "rtmp://live.twitch.tv/app/";
}
else if(platform.value === "youtube"){
rtmpUrl.value = "rtmp://a.rtmp.youtube.com/live2/";
}
else if(platform.value === "custom"){
rtmpUrl.value = "";
}
};

/* SOURCES */
document.getElementById("selectScreen").onclick = async () => {
screenStream = await navigator.mediaDevices.getDisplayMedia({video:true,audio:true});
document.getElementById("screen").srcObject = screenStream;
document.getElementById("screenStatus").innerText="Screen ✔";
};

document.getElementById("selectWebcam").onclick = async () => {
webcamStream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
document.getElementById("webcam").srcObject = webcamStream;
document.getElementById("camStatus").innerText="Webcam ✔";
};

/* DRAG SYSTEM */
function makeDraggable(el){
let x=0,y=0,down=false;

el.addEventListener("pointerdown",(e)=>{
down=true;
x=e.clientX - el.offsetLeft;
y=e.clientY - el.offsetTop;
el.setPointerCapture(e.pointerId);
});

el.addEventListener("pointermove",(e)=>{
if(!down)return;
el.style.left=(e.clientX-x)+"px";
el.style.top=(e.clientY-y)+"px";
});

el.addEventListener("pointerup",()=>down=false);
}

makeDraggable(document.getElementById("screenLayer"));
makeDraggable(document.getElementById("webcamLayer"));

/* CONNECT */
document.getElementById("connectBtn").onclick = () => {

const proto = location.protocol === "https:" ? "wss" : "ws";
ws = new WebSocket(`${proto}://${location.host}`);

ws.onopen = () => {
ws.send(JSON.stringify({
type:"configure",
rtmpUrl: rtmpUrl.value,
streamKey: streamKey.value
}));

document.getElementById("connectBtn").innerText="Connected";
};

ws.onclose = () => {
document.getElementById("connectBtn").innerText="Connect";
};
};

/* STREAM */
async function start(streaming=false){

if(!screenStream) return alert("Select screen first");

chunks=[];

recorder = new MediaRecorder(screenStream);

recorder.ondataavailable = e => {
if(e.data.size > 0){
chunks.push(e.data);

if(streaming && ws){
const r = new FileReader();
r.onload = () => {
ws.send(JSON.stringify({
type:"video-chunk",
chunk:r.result.split(",")[1]
}));
};
r.readAsDataURL(e.data);
}
}
};

recorder.onstop = () => {
const blob = new Blob(chunks);
const url = URL.createObjectURL(blob);
document.getElementById("downloads").innerHTML +=
`<a href="${url}" download>Download</a><br>`;
};

recorder.start(1000);

if(streaming && ws){
ws.send(JSON.stringify({type:"start-stream"}));
}
}

/* BUTTONS */
document.getElementById("goLiveBtn").onclick = () => {
if(!ws) return alert("Connect first");
start(true);
};

document.getElementById("recordBtn").onclick = () => start(false);

document.getElementById("stopBtn").onclick = () => {
if(recorder) recorder.stop();
};

document.getElementById("stopStreamBtn").onclick = () => {
if(ws) ws.send(JSON.stringify({type:"stop-stream"}));
if(recorder) recorder.stop();
};

</script>

</body>
</html>

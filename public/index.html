<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Studio - OBS Scenes</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:DM Sans;
background:#0a0e1a;
color:white;
}

.app{
display:grid;
grid-template-columns:340px 1fr;
height:100vh;
}

/* SIDEBAR */
.sidebar{
background:#151b2e;
padding:16px;
overflow-y:auto;
border-right:1px solid #222;
}

h3{color:#00ff88}

/* buttons */
input,select,button{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:6px;
background:#1e2538;
color:white;
}

button{cursor:pointer;}

#connectBtn{background:#00ff88;color:black;font-weight:bold;}
#goLiveBtn{background:#9146ff;}
#stopStreamBtn{background:#ff3366;}

/* SCENES */
.sceneBox{
background:#0f1424;
padding:10px;
border-radius:8px;
margin-top:10px;
border:1px solid #222;
}

.layerItem{
display:flex;
justify-content:space-between;
align-items:center;
background:#1e2538;
padding:6px;
border-radius:6px;
margin-top:5px;
font-size:13px;
}

.layerItem button{
width:auto;
padding:4px 8px;
font-size:12px;
}

/* STAGE */
.preview{
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

#stage{
position:relative;
width:90%;
height:85vh;
background:black;
border-radius:10px;
overflow:hidden;
}

/* DRAGGABLE */
.layer{
position:absolute;
touch-action:none;
user-select:none;
border-radius:8px;
overflow:hidden;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

.hidden{
display:none !important;
}

/* webcam */
#webcamLayer{
width:220px;
height:160px;
bottom:20px;
right:20px;
border:2px solid #00ff88;
}

/* screen */
#screenLayer{
width:100%;
height:100%;
top:0;
left:0;
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">

<h3>STREAM.STUDIO</h3>

<button onclick="addLayer('screen')">+ Screen Layer</button>
<button onclick="addLayer('webcam')">+ Webcam Layer</button>

<hr>

<div class="sceneBox">
<h4>Scenes</h4>
<button onclick="switchScene(1)">Scene 1</button>
<button onclick="switchScene(2)">Scene 2</button>
<button onclick="switchScene(3)">Scene 3</button>
</div>

<div class="sceneBox">
<h4>Layers</h4>
<div id="layerList"></div>
</div>

<hr>

<select id="platform">
<option value="">Platform</option>
<option value="twitch">Twitch</option>
<option value="youtube">YouTube</option>
<option value="custom">Custom</option>
</select>

<input id="rtmpUrl" placeholder="RTMP URL">
<input id="streamKey" placeholder="Stream Key">

<button id="connectBtn">Connect</button>
<button id="goLiveBtn">Go Live</button>
<button id="stopStreamBtn">Stop Stream</button>

</div>

<!-- STAGE -->
<div class="preview">
<div id="stage"></div>
</div>

</div>

<script>

let ws;
let recorder;
let chunks=[];

let screenStream=null;
let webcamStream=null;

let currentScene = 1;

const stage = document.getElementById("stage");
const layerList = document.getElementById("layerList");

const layers = {}; 
const scenes = {
  1: [],
  2: [],
  3: []
};

/* ADD LAYERS */
function addLayer(type){

let el = document.createElement("div");
el.className="layer";
el.dataset.type=type;

if(type==="screen"){
el.id="screenLayer";
el.style.width="100%";
el.style.height="100%";
el.innerHTML='<video id="screen" autoplay muted></video>';

}else if(type==="webcam"){
el.id="webcamLayer";
el.style.width="220px";
el.style.height="160px";
el.style.bottom="20px";
el.style.right="20px";
el.innerHTML='<video id="webcam" autoplay muted></video>';
}

stage.appendChild(el);
makeDraggable(el);

layers[type]=el;
scenes[currentScene].push(type);

renderLayers();
}

/* SHOW/HIDE PER SCENE */
function switchScene(id){
currentScene=id;

Object.keys(layers).forEach(k=>{
layers[k].classList.add("hidden");
});

scenes[id].forEach(k=>{
if(layers[k]) layers[k].classList.remove("hidden");
});

renderLayers();
}

/* LAYER LIST UI */
function renderLayers(){
layerList.innerHTML="";

Object.keys(layers).forEach(k=>{
let div=document.createElement("div");
div.className="layerItem";

div.innerHTML=`
<span>${k}</span>
<button onclick="toggleLayer('${k}')">Toggle</button>
`;

layerList.appendChild(div);
});
}

function toggleLayer(name){
if(!layers[name])return;

layers[name].classList.toggle("hidden");
}

/* DRAG */
function makeDraggable(el){
let x=0,y=0,down=false;

el.addEventListener("pointerdown",(e)=>{
down=true;
x=e.clientX - el.offsetLeft;
y=e.clientY - el.offsetTop;
el.setPointerCapture(e.pointerId);
el.style.zIndex=999;
});

el.addEventListener("pointermove",(e)=>{
if(!down)return;
el.style.left=(e.clientX-x)+"px";
el.style.top=(e.clientY-y)+"px";
});

el.addEventListener("pointerup",()=>down=false);
}

/* SOURCES */
async function initScreen(){
screenStream = await navigator.mediaDevices.getDisplayMedia({video:true,audio:true});
document.getElementById("screen").srcObject = screenStream;
}

async function initWebcam(){
webcamStream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
document.getElementById("webcam").srcObject = webcamStream;
}

/* PLATFORM AUTOFILL FIX */
document.getElementById("platform").onchange=()=>{
if(platform.value==="twitch"){
rtmpUrl.value="rtmp://live.twitch.tv/app/";
}
if(platform.value==="youtube"){
rtmpUrl.value="rtmp://a.rtmp.youtube.com/live2/";
}
};

/* CONNECT */
document.getElementById("connectBtn").onclick=()=>{
const proto=location.protocol==="https:"?"wss":"ws";
ws=new WebSocket(`${proto}://${location.host}`);

ws.onopen=()=>{
ws.send(JSON.stringify({
type:"configure",
rtmpUrl:rtmpUrl.value,
streamKey:streamKey.value
}));
};
};

/* STREAM */
async function start(streaming=false){
if(!screenStream)return alert("Add screen layer first");

chunks=[];

recorder=new MediaRecorder(screenStream);

recorder.ondataavailable=e=>{
if(e.data.size>0){

chunks.push(e.data);

if(streaming && ws){
const r=new FileReader();
r.onload=()=>{
ws.send(JSON.stringify({
type:"video-chunk",
chunk:r.result.split(",")[1]
}));
};
r.readAsDataURL(e.data);
}
}
};

recorder.start(1000);

if(streaming && ws){
ws.send(JSON.stringify({type:"start-stream"}));
}
}

/* BUTTONS */
document.getElementById("goLiveBtn").onclick=()=>start(true);
document.getElementById("stopBtn").onclick=()=>recorder?.stop();

document.getElementById("stopStreamBtn").onclick=()=>{
ws?.send(JSON.stringify({type:"stop-stream"}));
recorder?.stop();
};

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Studio - OBS Properties</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:DM Sans;
background:#0a0e1a;
color:white;
}

.app{
display:grid;
grid-template-columns:340px 1fr;
height:100vh;
}

/* SIDEBAR */
.sidebar{
background:#151b2e;
padding:16px;
overflow-y:auto;
border-right:1px solid #222;
}

h3{color:#00ff88}

input,select,button{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:6px;
background:#1e2538;
color:white;
}

button{cursor:pointer;}

#connectBtn{background:#00ff88;color:black;font-weight:bold;}
#goLiveBtn{background:#9146ff;}
#stopStreamBtn{background:#ff3366;}

/* STAGE */
.preview{
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

#stage{
position:relative;
width:90%;
height:85vh;
background:black;
border-radius:10px;
overflow:hidden;
}

/* LAYERS */
.layer{
position:absolute;
touch-action:none;
user-select:none;
border-radius:8px;
overflow:hidden;
border:2px solid transparent;
}

.layer.selected{
border:2px solid #00ff88;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

.hidden{display:none !important;}

/* webcam default */
#webcamLayer{
width:220px;
height:160px;
bottom:20px;
right:20px;
}

/* RIGHT CLICK MENU */
#contextMenu{
position:absolute;
display:none;
background:#1e2538;
border:1px solid #333;
padding:10px;
border-radius:8px;
z-index:9999;
width:180px;
}

#contextMenu button{
margin:5px 0;
}

/* PROPERTIES PANEL */
#properties{
margin-top:10px;
padding:10px;
background:#0f1424;
border-radius:8px;
border:1px solid #222;
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">

<h3>STREAM.STUDIO</h3>

<button onclick="addLayer('screen')">+ Screen Layer</button>
<button onclick="addLayer('webcam')">+ Webcam Layer</button>

<div id="properties">
<h4>Properties</h4>
<div id="propContent">Right click a layer</div>
</div>

<hr>

<select id="platform">
<option value="">Platform</option>
<option value="twitch">Twitch</option>
<option value="youtube">YouTube</option>
<option value="custom">Custom</option>
</select>

<input id="rtmpUrl" placeholder="RTMP URL">
<input id="streamKey" placeholder="Stream Key">

<button id="connectBtn">Connect</button>
<button id="goLiveBtn">Go Live</button>
<button id="stopStreamBtn">Stop Stream</button>

</div>

<!-- STAGE -->
<div class="preview">
<div id="stage"></div>

<div id="contextMenu">
<button onclick="setSource('screen')">Use Screen</button>
<button onclick="setSource('webcam')">Use Webcam</button>
<button onclick="deleteLayer()">Delete</button>
</div>

</div>

</div>

<script>

let ws;
let recorder;
let chunks=[];

let screenStream=null;
let webcamStream=null;

let selectedLayer=null;

/* LAYERS */
const stage=document.getElementById("stage");
const menu=document.getElementById("contextMenu");

/* CREATE LAYER */
function addLayer(type){

let el=document.createElement("div");
el.className="layer";
el.dataset.type=type;

if(type==="screen"){
el.innerHTML='<video autoplay muted></video>';
el.style.width="100%";
el.style.height="100%";

}else if(type==="webcam"){
el.innerHTML='<video autoplay muted></video>';
el.style.width="220px";
el.style.height="160px";
el.style.bottom="20px";
el.style.right="20px";
}

stage.appendChild(el);
makeDraggable(el);

/* RIGHT CLICK */
el.addEventListener("contextmenu",(e)=>{
e.preventDefault();
selectedLayer=el;
menu.style.display="block";
menu.style.left=e.pageX+"px";
menu.style.top=e.pageY+"px";
showProps(el);
});

return el;
}

/* PROPERTIES PANEL */
function showProps(layer){
document.getElementById("propContent").innerHTML=`
<b>Type:</b> ${layer.dataset.type}<br><br>
<button onclick="changeSource('${layer.dataset.type}')">Change Source</button>
`;
}

/* CHANGE SOURCE */
async function changeSource(type){

if(type==="screen"){
screenStream = await navigator.mediaDevices.getDisplayMedia({video:true,audio:true});
selectedLayer.querySelector("video").srcObject=screenStream;
}

if(type==="webcam"){
webcamStream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
selectedLayer.querySelector("video").srcObject=webcamStream;
}
}

/* CONTEXT ACTIONS */
function setSource(type){
changeSource(type);
menu.style.display="none";
}

function deleteLayer(){
if(selectedLayer){
selectedLayer.remove();
selectedLayer=null;
}
menu.style.display="none";
}

/* DRAG */
function makeDraggable(el){
let x=0,y=0,down=false;

el.addEventListener("pointerdown",(e)=>{
down=true;
x=e.clientX - el.offsetLeft;
y=e.clientY - el.offsetTop;
el.setPointerCapture(e.pointerId);
el.classList.add("selected");
});

el.addEventListener("pointermove",(e)=>{
if(!down)return;
el.style.left=(e.clientX-x)+"px";
el.style.top=(e.clientY-y)+"px";
});

el.addEventListener("pointerup",()=>{
down=false;
});
}

/* PLATFORM FIX */
document.getElementById("platform").onchange=()=>{
if(platform.value==="twitch"){
rtmpUrl.value="rtmp://live.twitch.tv/app/";
}
if(platform.value==="youtube"){
rtmpUrl.value="rtmp://a.rtmp.youtube.com/live2/";
}
};

/* CONNECT */
document.getElementById("connectBtn").onclick=()=>{
const proto=location.protocol==="https:"?"wss":"ws";
ws=new WebSocket(`${proto}://${location.host}`);

ws.onopen=()=>{
ws.send(JSON.stringify({
type:"configure",
rtmpUrl:rtmpUrl.value,
streamKey:streamKey.value
}));
};
};

/* CLICK OUTSIDE CLOSE MENU */
window.onclick=()=>{
menu.style.display="none";
selectedLayer?.classList.remove("selected");
selectedLayer=null;
};

</script>

</body>
</html>

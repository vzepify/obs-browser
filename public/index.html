<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Studio - OBS Clone Pro</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:DM Sans;
background:#0a0e1a;
color:white;
}

.app{
display:grid;
grid-template-columns:340px 1fr 280px;
height:100vh;
}

/* SIDEBAR */
.sidebar{
background:#151b2e;
padding:16px;
overflow-y:auto;
border-right:1px solid #222;
}

h3{color:#00ff88}

/* UI */
input,select,button{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:6px;
background:#1e2538;
color:white;
}

button{cursor:pointer;}

#connectBtn{background:#00ff88;color:black;font-weight:bold;}
#goLiveBtn{background:#9146ff;}
#stopStreamBtn{background:#ff3366;}

/* STAGE */
.preview{
display:flex;
justify-content:center;
align-items:center;
background:#0a0e1a;
}

#stage{
position:relative;
width:95%;
height:90vh;
background:black;
border-radius:10px;
overflow:hidden;
}

/* LAYERS */
.layer{
position:absolute;
border-radius:8px;
overflow:hidden;
border:2px solid transparent;
touch-action:none;
}

.layer.selected{
border:2px solid #00ff88;
}

video,iframe,img{
width:100%;
height:100%;
object-fit:cover;
}

/* resize handles */
.handle{
width:10px;
height:10px;
background:#00ff88;
position:absolute;
right:0;
bottom:0;
cursor:nwse-resize;
}

/* context menu */
#menu{
position:absolute;
display:none;
background:#1e2538;
border:1px solid #333;
padding:10px;
border-radius:8px;
z-index:9999;
width:180px;
}

/* right panel */
.rightPanel{
background:#151b2e;
padding:10px;
border-left:1px solid #222;
overflow-y:auto;
}

.sceneBtn{
background:#0f1424;
margin:5px 0;
}

/* mixer */
.meter{
height:6px;
background:#333;
margin:4px 0;
position:relative;
}
.bar{
height:100%;
background:#00ff88;
width:50%;
}
</style>
</head>

<body>

<div class="app">

<!-- LEFT -->
<div class="sidebar">

<h3>STREAM.STUDIO PRO</h3>

<button onclick="addScene()">+ Scene</button>
<div id="sceneList"></div>

<hr>

<button onclick="addLayer('screen')">Screen</button>
<button onclick="addLayer('webcam')">Webcam</button>
<button onclick="addLayer('text')">Text</button>
<button onclick="addLayer('image')">Image</button>
<button onclick="addLayer('browser')">Browser</button>

<hr>

<select id="platform">
<option value="">Platform</option>
<option value="twitch">Twitch</option>
<option value="youtube">YouTube</option>
</select>

<input id="rtmpUrl" placeholder="RTMP URL">
<input id="streamKey" placeholder="Key">

<button id="connectBtn">Connect</button>
<button id="goLiveBtn">Go Live</button>
<button id="stopStreamBtn">Stop</button>

<hr>

<h4>Save / Load</h4>
<button onclick="saveScene()">Save Scene</button>
<button onclick="loadScene()">Load Scene</button>

</div>

<!-- STAGE -->
<div class="preview">
<div id="stage"></div>

<div id="menu">
<button onclick="setType('screen')">Screen</button>
<button onclick="setType('webcam')">Webcam</button>
<button onclick="setType('text')">Text</button>
<button onclick="setType('browser')">Browser</button>
<button onclick="removeLayer()">Delete</button>
</div>

</div>

<!-- RIGHT -->
<div class="rightPanel">

<h4>Audio Mixer</h4>

Mic
<div class="meter"><div class="bar" id="micBar"></div></div>

System
<div class="meter"><div class="bar" id="sysBar"></div></div>

Master
<div class="meter"><div class="bar" id="masterBar"></div></div>

</div>

</div>

<script>

let stage=document.getElementById("stage");
let menu=document.getElementById("menu");

let selected=null;
let scenes=[];
let currentScene=0;

let streams={};

/* SCENES */
function addScene(){
scenes.push([]);
renderScenes();
}

function renderScenes(){
document.getElementById("sceneList").innerHTML=
scenes.map((s,i)=>
`<button class="sceneBtn" onclick="switchScene(${i})">Scene ${i+1}</button>`
).join("");
}

function switchScene(i){
currentScene=i;
stage.innerHTML="";
scenes[i].forEach(l=>stage.appendChild(l));
}

/* LAYERS */
function addLayer(type){

let el=document.createElement("div");
el.className="layer";
el.dataset.type=type;

if(type==="screen"){
el.innerHTML="<video autoplay muted></video>";
el.style.width="100%";
el.style.height="100%";
startScreen(el);

}else if(type==="webcam"){
el.innerHTML="<video autoplay muted></video>";
el.style.width="200px";
el.style.height="150px";
startCam(el);

}else if(type==="text"){
el.innerHTML="<div contenteditable style='color:white;padding:10px'>Text</div>";
el.style.width="200px";
el.style.height="80px";

}else if(type==="image"){
el.innerHTML="<img src='https://placekitten.com/300/200'>";
el.style.width="200px";
el.style.height="150px";

}else if(type==="browser"){
el.innerHTML="<iframe src='https://youtube.com'></iframe>";
el.style.width="300px";
el.style.height="200px";
}

makeDraggable(el);
makeResizable(el);

el.oncontextmenu=(e)=>{
e.preventDefault();
selected=el;
menu.style.display="block";
menu.style.left=e.pageX+"px";
menu.style.top=e.pageY+"px";
};

stage.appendChild(el);
scenes[currentScene]=scenes[currentScene]||[];
scenes[currentScene].push(el);
}

/* SOURCES */
async function startScreen(el){
let stream=await navigator.mediaDevices.getDisplayMedia({video:true,audio:true});
el.querySelector("video").srcObject=stream;
}

async function startCam(el){
let stream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
el.querySelector("video").srcObject=stream;
}

/* DRAG */
function makeDraggable(el){
let x=0,y=0,down=false;

el.addEventListener("pointerdown",(e)=>{
down=true;
x=e.clientX-el.offsetLeft;
y=e.clientY-el.offsetTop;
el.setPointerCapture(e.pointerId);
el.style.zIndex=999;
});

el.addEventListener("pointermove",(e)=>{
if(!down)return;
el.style.left=(e.clientX-x)+"px";
el.style.top=(e.clientY-y)+"px";
});

el.addEventListener("pointerup",()=>down=false);
}

/* RESIZE */
function makeResizable(el){
let h=document.createElement("div");
h.className="handle";
el.appendChild(h);

let resizing=false;

h.onpointerdown=(e)=>{
resizing=true;
e.stopPropagation();
};

window.onpointermove=(e)=>{
if(!resizing)return;
el.style.width=e.clientX-el.offsetLeft+"px";
el.style.height=e.clientY-el.offsetTop+"px";
};

window.onpointerup=()=>resizing=false;
}

/* MENU ACTIONS */
function setType(type){
if(!selected)return;
selected.dataset.type=type;
menu.style.display="none";
}

function removeLayer(){
if(selected){
selected.remove();
selected=null;
}
menu.style.display="none";
}

/* SAVE / LOAD */
function saveScene(){
localStorage.setItem("scene",stage.innerHTML);
alert("Saved");
}

function loadScene(){
stage.innerHTML=localStorage.getItem("scene")||"";
}

/* CONNECT */
document.getElementById("connectBtn").onclick=()=>{
let ws=new WebSocket((location.protocol==="https:"?"wss":"ws")+"://"+location.host);

ws.onopen=()=>{
ws.send(JSON.stringify({
type:"configure",
rtmpUrl:rtmpUrl.value,
streamKey:streamKey.value
}));
};
};

window.onclick=()=>menu.style.display="none";

</script>

</body>
</html>
